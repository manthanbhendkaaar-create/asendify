<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Layout Test</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        .test-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; width: 100%; }
    </style>
</head>
<body>
    <section class="test-section">
        <div class="container">
            <div class="hero-content" style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; align-items: center; width: 100%;">
                <!-- Left Side: Globe Animation -->
                <div class="globe-container reveal">
                    <svg class="globe-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                        <!-- Outer circle -->
                        <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(212, 175, 55, 0.2)" stroke-width="2"/>
                        
                        <!-- Globe base -->
                        <circle cx="200" cy="200" r="160" fill="rgba(20, 40, 80, 0.3)" stroke="rgba(212, 175, 55, 0.3)" stroke-width="1.5"/>
                        
                        <!-- Continents/landmasses (simplified) -->
                        <g fill="rgba(212, 175, 55, 0.15)" opacity="0.7">
                            <!-- North America -->
                            <ellipse cx="120" cy="140" rx="35" ry="45" transform="rotate(-15 120 140)"/>
                            <!-- South America -->
                            <ellipse cx="130" cy="240" rx="20" ry="35" transform="rotate(20 130 240)"/>
                            <!-- Europe -->
                            <ellipse cx="200" cy="120" rx="30" ry="25" transform="rotate(10 200 120)"/>
                            <!-- Africa -->
                            <ellipse cx="240" cy="180" rx="35" ry="45" transform="rotate(5 240 180)"/>
                            <!-- Asia -->
                            <ellipse cx="280" cy="140" rx="50" ry="40" transform="rotate(-10 280 140)"/>
                        </g>

                        <!-- City markers with glow -->
                        <g class="city-markers">
                            <!-- London -->
                            <circle cx="200" cy="130" r="6" fill="rgba(212, 175, 55, 0.3)"/>
                            <circle cx="200" cy="130" r="3" fill="#d4af37" class="city-dot"/>
                            <text x="200" y="115" text-anchor="middle" font-size="12" fill="rgba(212, 175, 55, 0.8)" font-family="'Outfit', sans-serif">London</text>

                            <!-- New York -->
                            <circle cx="130" cy="145" r="6" fill="rgba(212, 175, 55, 0.3)"/>
                            <circle cx="130" cy="145" r="3" fill="#d4af37" class="city-dot"/>
                            <text x="130" y="165" text-anchor="middle" font-size="12" fill="rgba(212, 175, 55, 0.8)" font-family="'Outfit', sans-serif">New York</text>

                            <!-- San Francisco -->
                            <circle cx="100" cy="155" r="6" fill="rgba(212, 175, 55, 0.3)"/>
                            <circle cx="100" cy="155" r="3" fill="#d4af37" class="city-dot"/>
                            <text x="100" y="175" text-anchor="middle" font-size="12" fill="rgba(212, 175, 55, 0.8)" font-family="'Outfit', sans-serif">San Francisco</text>

                            <!-- Tokyo -->
                            <circle cx="300" cy="130" r="6" fill="rgba(212, 175, 55, 0.3)"/>
                            <circle cx="300" cy="130" r="3" fill="#d4af37" class="city-dot"/>
                            <text x="300" y="115" text-anchor="middle" font-size="12" fill="rgba(212, 175, 55, 0.8)" font-family="'Outfit', sans-serif">Tokyo</text>

                            <!-- Hong Kong -->
                            <circle cx="280" cy="180" r="6" fill="rgba(212, 175, 55, 0.3)"/>
                            <circle cx="280" cy="180" r="3" fill="#d4af37" class="city-dot"/>
                            <text x="280" y="205" text-anchor="middle" font-size="12" fill="rgba(212, 175, 55, 0.8)" font-family="'Outfit', sans-serif">Hong Kong</text>
                        </g>

                        <!-- Grid lines -->
                        <g stroke="rgba(212, 175, 55, 0.1)" stroke-width="0.5" opacity="0.5">
                            <!-- Longitude lines -->
                            <line x1="200" y1="40" x2="200" y2="360"/>
                            <line x1="120" y1="80" x2="280" y2="320"/>
                            <line x1="280" y1="80" x2="120" y2="320"/>
                            <!-- Latitude lines -->
                            <ellipse cx="200" cy="200" rx="160" ry="60"/>
                            <ellipse cx="200" cy="200" rx="160" ry="100"/>
                        </g>
                    </svg>
                    <style>
                        @keyframes rotateGlobe {
                            from {
                                transform: rotateZ(0deg);
                            }
                            to {
                                transform: rotateZ(360deg);
                            }
                        }

                        @keyframes pulseDot {
                            0%, 100% {
                                r: 3;
                                opacity: 1;
                            }
                            50% {
                                r: 5;
                                opacity: 0.6;
                            }
                        }

                        .globe-svg {
                            animation: rotateGlobe 20s linear infinite;
                            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.2));
                        }

                        .city-dot {
                            animation: pulseDot 2s ease-in-out infinite;
                        }
                    </style>
                </div>

                <!-- Right Side: Contact Form -->
                <div class="hero-form reveal delay-3">
                    <div style="background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); width: 100%; max-width: none;">
                        <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; margin-bottom: 8px; color: #f5f5f5;">Quick Inquiry</h3>
                        <p style="color: #9a9a9a; margin-bottom: 30px; font-size: 0.9rem;">Let us know about your project</p>
                        
                        <form>
                            <div style="margin-bottom: 20px;">
                                <input type="text" placeholder="Your Name" style="width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #f5f5f5; font-family: 'Outfit', sans-serif;" />
                            </div>
                            <div style="margin-bottom: 20px;">
                                <input type="email" placeholder="Your Email" style="width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #f5f5f5; font-family: 'Outfit', sans-serif;" />
                            </div>
                            <div style="margin-bottom: 20px;">
                                <input type="tel" placeholder="Your Phone (Optional)" style="width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #f5f5f5; font-family: 'Outfit', sans-serif;" />
                            </div>
                            <div style="margin-bottom: 24px;">
                                <textarea placeholder="Tell us about your project..." rows="4" style="width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #f5f5f5; font-family: 'Outfit', sans-serif; resize: none;"></textarea>
                            </div>
                            <button type="submit" style="width: 100%; padding: 14px 24px; background: linear-gradient(135deg, #d4af37 0%, #e8c84a 100%); border: none; border-radius: 8px; color: #050505; font-weight: 600; font-family: 'Outfit', sans-serif; font-size: 0.95rem; cursor: pointer;">
                                Send Inquiry →
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
